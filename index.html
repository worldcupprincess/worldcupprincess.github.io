<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here We Go!!</title>
    
    <!-- Forces GitHub Pages and browsers to fetch a fresh version every single time -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            display: none; /* Hidden until the user interacts */
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .counter {
            font-size: 5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            background-color: #00ff88;
            color: #121212;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #00cc6e;
            transform: scale(1.05);
        }

        /* Radio Station Controls Styling */
        .radio-card {
            margin-top: 40px;
            padding: 20px 25px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .radio-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .station-name {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00ff88;
        }

        /* Animated Pride Bouncy Tagline Styling */
        .tagline {
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 2px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3em;
        }
        .tagline .word {
            display: inline-block;
            white-space: nowrap;
        }
        .tagline span {
            display: inline-block;
            animation: bounce 1.2s infinite ease-in-out alternate;
        }

        /* Pride Color Palette Cycle */
        .tagline span:nth-child(6n+1) { color: #e70000; } /* Red */
        .tagline span:nth-child(6n+2) { color: #ff8c00; } /* Orange */
        .tagline span:nth-child(6n+3) { color: #ffef00; } /* Yellow */
        .tagline span:nth-child(6n+4) { color: #00811f; } /* Green */
        .tagline span:nth-child(6n+5) { color: #0044ff; } /* Blue */
        .tagline span:nth-child(6n+6) { color: #760089; } /* Purple */

        /* Staggered Bounce Animation Delays */
        .tagline span:nth-child(1) { animation-delay: 0.0s; }
        .tagline span:nth-child(2) { animation-delay: 0.1s; }
        .tagline span:nth-child(3) { animation-delay: 0.2s; }
        .tagline span:nth-child(4) { animation-delay: 0.3s; }
        .tagline span:nth-child(5) { animation-delay: 0.4s; }
        .tagline span:nth-child(6) { animation-delay: 0.5s; }
        .tagline span:nth-child(7) { animation-delay: 0.6s; }
        .tagline span:nth-child(8) { animation-delay: 0.7s; }

        @keyframes bounce {
            0% {
                transform: translateY(0);
                text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
            }
            100% {
                transform: translateY(-7px);
                text-shadow: 0 0 12px currentColor;
            }
        }

        .radio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-top: 8px;
        }
        .control-btn {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .control-btn:hover {
            background-color: #00ff88;
            color: #121212;
            border-color: #00ff88;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 0.85rem;
        }
        .volume-slider {
            accent-color: #00ff88;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Overlay to bypass the browser autoplay block -->
    <div id="welcome-screen">
        <button class="btn" onclick="startPage()">Here We Go!!</button>
    </div>

    <!-- The dynamic content -->
    <div id="content" class="container">
        <h1>Day</h1>
        <div class="counter" id="days-counter">1</div>
        <h1>of no football corruption.</h1>

        <!-- Radio Station Feature -->
        <div class="radio-card">
            <div class="radio-header">
                <span class="live-dot"></span>
                <span class="station-name">Princess L FM</span>
            </div>
            
            <!-- Animated Pride Bouncy Tagline -->
            <div class="tagline">
                <span class="word"><span>P</span><span>a</span><span>a</span><span>n</span><span>c</span><span>h</span></span>
                <span class="word"><span>R</span><span>u</span><span>p</span><span>a</span><span>y</span><span>e</span></span>
                <span class="word"><span>K</span><span>i</span></span>
                <span class="word"><span>P</span><span>e</span><span>p</span><span>s</span><span>i</span><span>.</span></span>
                <span class="word"><span>M</span><span>Ǝ</span><span>S</span><span>S</span><span>I</span></span>
                <span class="word"><span>P</span><span>r</span><span>i</span><span>n</span><span>c</span><span>e</span><span>s</span><span>s</span></span>
                <span class="word"><span>S</span><span>Ǝ</span><span>x</span><span>y</span></span>
            </div>
            
            <div class="radio-controls">
                <button class="control-btn" id="play-pause-btn" onclick="toggleAudio()" title="Play/Pause">❚❚</button>
                <button class="control-btn" id="next-btn" onclick="playNextTrack()" title="Next Track">⏭</button>
                <div class="volume-container">
                    <span>🔊</span>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="adjustVolume(this.value)">
                </div>
            </div>
        </div>
    </div>

    <!-- Background Audio Element -->
    <audio id="bg-audio" onended="playNextTrack()"></audio>

    <script>
        const audioFiles = [
            "tracks/audio.mp3",
            "tracks/argentinaaaa.mp3",
            "tracks/cucu.mp3",
            "tracks/final.mp3"
        ];

        const audio = document.getElementById('bg-audio');
        let currentTrackIndex = 0;

        function setInitialTrack() {
            currentTrackIndex = Math.floor(Math.random() * audioFiles.length);
            audio.src = audioFiles[currentTrackIndex];
        }

        setInitialTrack();

        function startPage() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            audio.play().then(() => {
                document.getElementById('play-pause-btn').innerText = '❚❚';
            }).catch((error) => {
                console.log("Audio playback failed:", error);
                document.getElementById('play-pause-btn').innerText = '▶';
            });

            calculateDays();
        }

        function toggleAudio() {
            const btn = document.getElementById('play-pause-btn');
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerText = '❚❚';
                }).catch(err => console.log("Play failed:", err));
            } else {
                audio.pause();
                btn.innerText = '▶';
            }
        }

        function playNextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % audioFiles.length;
            audio.src = audioFiles[currentTrackIndex];
            audio.play().then(() => {
                document.getElementById('play-pause-btn').innerText = '❚❚';
            }).catch(err => console.log("Playback failed:", err));
        }

        function adjustVolume(val) {
            audio.volume = val;
        }

        function calculateDays() {
            // Set base start date: July 20, 2026 (Day 1)
            const startDate = new Date(2026, 6, 20); // Note: Month is 0-indexed (6 = July)
            const today = new Date();

            // Normalize both dates to local midnight to eliminate time-of-day offsets
            const startMidnight = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            const timeDiff = todayMidnight - startMidnight;
            const daysPassed = Math.floor(timeDiff / (1000 * 60 * 60 * 24)) + 1;

            document.getElementById('days-counter').innerText = daysPassed >= 1 ? daysPassed : 1;
        }
    </script>
</body>
</html>
